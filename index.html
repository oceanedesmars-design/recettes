<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La cuisine de mes rêves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0e0a;
      --surface: #1a1915;
      --card: #201f1a;
      --border: #2e2c25;
      --accent: #e8c547;
      --accent2: #c97b3a;
      --accent3: #7ab87a;
      --text: #f0ece0;
      --text-muted: #8a8676;
      --red: #d45d4a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* ─── HEADER ─── */
    header {
      padding: 3rem 4rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .logo em {
      font-style: italic;
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .recipe-count {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .btn-add {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.7rem 1.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }
    .btn-add:hover {
      background: var(--text);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232,197,71,0.25);
    }

    /* ─── MAIN LAYOUT ─── */
    .container {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 100px);
    }

    /* ─── SIDEBAR ─── */
    aside {
      border-right: 1px solid var(--border);
      padding: 2.5rem 2rem;
      position: sticky;
      top: 100px;
      height: calc(100vh - 100px);
      overflow-y: auto;
    }

    .sidebar-section {
      margin-bottom: 2.5rem;
    }

    .sidebar-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sidebar-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .search-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-muted); }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag-filter {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.8rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.18s;
      text-transform: lowercase;
    }
    .tag-filter:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tag-filter.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .ingredient-filter-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      max-height: 220px;
      overflow-y: auto;
    }
    .ingredient-filter-list::-webkit-scrollbar { width: 3px; }
    .ingredient-filter-list::-webkit-scrollbar-track { background: transparent; }
    .ingredient-filter-list::-webkit-scrollbar-thumb { background: var(--border); }

    .ing-filter-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      padding: 0.25rem 0;
    }
    .ing-filter-item input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .ing-filter-item input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .ing-filter-item input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -2px;
      left: 2px;
      font-size: 10px;
      color: var(--bg);
    }
    .ing-filter-item label {
      font-size: 0.72rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s;
    }
    .ing-filter-item:hover label { color: var(--text); }

    .clear-filters {
      background: transparent;
      border: none;
      color: var(--red);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 1.5rem;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .clear-filters:hover { color: var(--text); }

    /* ─── RECIPES GRID ─── */
    .recipes-area {
      padding: 2.5rem 3rem;
    }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .results-info {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.8rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      outline: none;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* ─── RECIPE CARD ─── */
    .recipe-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1.6rem;
      position: relative;
      cursor: pointer;
      transition: all 0.25s;
      animation: fadeUp 0.4s ease both;
    }
    .recipe-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: var(--accent);
      transition: height 0.3s ease;
    }
    .recipe-card:hover { transform: translateY(-4px); border-color: #3e3c30; }
    .recipe-card:hover::before { height: 100%; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
    }

    .card-emoji {
      font-size: 1.8rem;
      line-height: 1;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .recipe-card:hover .card-actions { opacity: 1; }

    .card-action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .card-action-btn:hover { border-color: var(--red); color: var(--red); }
    .card-action-btn.edit:hover { border-color: var(--accent); color: var(--accent); }

    .card-title {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
      line-height: 1.25;
    }

    .card-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }

    .card-description {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.9rem;
    }

    .tag-pill {
      font-size: 0.63rem;
      padding: 0.2rem 0.6rem;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      border: 1px solid;
    }

    .tag-comfort { border-color: var(--accent2); color: var(--accent2); }
    .tag-healthy { border-color: var(--accent3); color: var(--accent3); }
    .tag-rapide  { border-color: #7ab8b8; color: #7ab8b8; }
    .tag-végétarien { border-color: var(--accent3); color: var(--accent3); }
    .tag-vegan   { border-color: #a8d080; color: #a8d080; }
    .tag-festif  { border-color: var(--accent); color: var(--accent); }
    .tag-default { border-color: var(--border); color: var(--text-muted); }

    .card-ingredients {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .ing-chip {
      font-size: 0.62rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.15rem 0.5rem;
      color: var(--text-muted);
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 6rem 2rem;
    }
    .empty-state .big-emoji { font-size: 4rem; margin-bottom: 1.5rem; }
    .empty-state h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .empty-state p { font-size: 0.75rem; color: var(--text-muted); }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,9,7,0.88);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2.5rem;
      transform: translateY(20px);
      transition: transform 0.25s;
      position: relative;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      font-weight: 300;
      margin-bottom: 0.3rem;
    }
    .modal-title em { font-style: italic; color: var(--accent); }

    .modal-subtitle {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { border-color: var(--red); color: var(--red); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    .form-label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--accent);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }

    .form-select option { background: var(--surface); }

    /* ingredient adder */
    .ing-adder {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .ing-adder input { flex: 1; }

    .btn-add-ing {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-add-ing:hover { border-color: var(--accent); color: var(--accent); }

    .ing-added-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .ing-added-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.25rem 0.6rem;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .ing-added-chip button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
      line-height: 1;
      padding: 0;
    }
    .ing-added-chip button:hover { color: var(--red); }

    /* categories checkboxes */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .cat-checkbox {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .cat-checkbox:has(input:checked) {
      border-color: var(--accent);
      background: rgba(232,197,71,0.07);
    }
    .cat-checkbox input { display: none; }
    .cat-checkbox span {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .cat-checkbox:has(input:checked) span { color: var(--accent); }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .btn-submit {
      flex: 1;
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.85rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-submit:hover { background: var(--text); }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.85rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    /* ─── RECIPE DETAIL MODAL ─── */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,9,7,0.92);
      backdrop-filter: blur(6px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .detail-overlay.open { opacity: 1; pointer-events: all; }

    .detail-modal {
      background: var(--card);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.96);
      transition: transform 0.25s;
    }
    .detail-overlay.open .detail-modal { transform: scale(1); }

    .detail-banner {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 2rem 2.5rem;
      position: relative;
    }
    .detail-banner-emoji { font-size: 3rem; margin-bottom: 0.8rem; }
    .detail-banner-title {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .detail-banner-meta {
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }
    .detail-close {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px; height: 32px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .detail-close:hover { border-color: var(--red); color: var(--red); }

    .detail-body { padding: 2rem 2.5rem; }

    .detail-section-title {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .detail-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .detail-ing-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .detail-ing-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
    }

    .detail-notes {
      font-size: 0.8rem;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 2rem;
      white-space: pre-line;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      header { padding: 1.5rem 1.5rem 1rem; }
      .logo { font-size: 1.5rem; }
      .container { grid-template-columns: 1fr; }
      aside {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 1.5rem;
      }
      .recipes-area { padding: 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
      .categories-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">La Cuisine<br>de Mes <em>Rêves</em></div>
    <div class="header-right">
      <span class="recipe-count" id="headerCount">0 recettes</span>
      <button class="btn-add" onclick="openAddModal()">+ Ajouter</button>
    </div>
  </header>

  <div class="container">
    <!-- SIDEBAR -->
    <aside>
      <div class="sidebar-section">
        <div class="sidebar-label">Recherche</div>
        <input class="search-box" type="text" placeholder="Chercher une recette..." id="searchInput" oninput="applyFilters()" />
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Catégories</div>
        <div class="tag-list" id="categoryFilters"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Ingrédients</div>
        <div class="ingredient-filter-list" id="ingredientFilters"></div>
      </div>

      <button class="clear-filters" onclick="clearAllFilters()">✕ Effacer filtres</button>
    </aside>

    <!-- MAIN -->
    <main class="recipes-area">
      <div class="results-bar">
        <span class="results-info" id="resultsInfo">—</span>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="newest">Plus récentes</option>
          <option value="oldest">Plus anciennes</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
        </select>
      </div>
      <div class="grid" id="recipesGrid"></div>
    </main>
  </div>

  <!-- ─── ADD/EDIT MODAL ─── -->
  <div class="modal-overlay" id="addModal" onclick="handleModalClick(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeAddModal()">✕</button>
      <h2 class="modal-title" id="modalTitle">Nouvelle <em>recette</em></h2>
      <p class="modal-subtitle" id="modalSubtitle">Immortalise tes créations culinaires</p>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Titre *</label>
          <input class="form-input" id="fTitle" placeholder="Tarte aux poires..." />
        </div>
        <div class="form-group">
          <label class="form-label">Emoji</label>
          <input class="form-input" id="fEmoji" placeholder="🍰" maxlength="4" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Temps de préparation</label>
          <input class="form-input" id="fTime" placeholder="30 min" />
        </div>
        <div class="form-group">
          <label class="form-label">Portions</label>
          <input class="form-input" id="fServings" placeholder="4 personnes" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Description courte</label>
        <input class="form-input" id="fDesc" placeholder="Un plat réconfortant parfait pour..." />
      </div>

      <div class="form-group">
        <label class="form-label">Ingrédients</label>
        <div class="ing-adder">
          <input class="form-input" id="fIngInput" placeholder="Ajouter un ingrédient..." onkeydown="handleIngKey(event)" />
          <button class="btn-add-ing" onclick="addIngredient()">+</button>
        </div>
        <div class="ing-added-list" id="fIngList"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes & instructions</label>
        <textarea class="form-textarea" id="fNotes" placeholder="Étapes, astuces, variantes..." rows="4"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Catégories</label>
        <div class="categories-grid" id="categoriesGrid"></div>
      </div>

      <div class="form-actions">
        <button class="btn-cancel" onclick="closeAddModal()">Annuler</button>
        <button class="btn-submit" onclick="saveRecipe()" id="submitBtn">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ─── DETAIL MODAL ─── -->
  <div class="detail-overlay" id="detailModal" onclick="handleDetailClick(event)">
    <div class="detail-modal">
      <div class="detail-banner" id="detailBanner">
        <button class="detail-close" onclick="closeDetailModal()">✕</button>
        <div class="detail-banner-emoji" id="detailEmoji"></div>
        <div class="detail-banner-title" id="detailTitle"></div>
        <div class="detail-banner-meta" id="detailMeta"></div>
      </div>
      <div class="detail-body">
        <div class="detail-section-title">Ingrédients</div>
        <div class="detail-ing-list" id="detailIngList"></div>
        <div class="detail-section-title" id="notesLabel">Notes</div>
        <div class="detail-notes" id="detailNotes"></div>
        <div class="detail-section-title">Catégories</div>
        <div class="detail-tags" id="detailTags"></div>
      </div>
    </div>
  </div>

  <script>
    // ─── DATA ───
    const CATEGORIES = [
      { id: 'comfort', label: '🍲 Comfort food' },
      { id: 'healthy', label: '🥗 Healthy' },
      { id: 'rapide',  label: '⚡ Rapide' },
      { id: 'végétarien', label: '🌿 Végétarien' },
      { id: 'vegan',   label: '🌱 Vegan' },
      { id: 'festif',  label: '🥂 Festif' },
      { id: 'brunch',  label: '☀️ Brunch' },
      { id: 'dessert', label: '🍰 Dessert' },
      { id: 'soupe',   label: '🍜 Soupe' },
    ];

    const SAMPLE_RECIPES = [
      {
        id: 1,
        title: 'Risotto aux champignons',
        emoji: '🍄',
        time: '40 min',
        servings: '4 personnes',
        description: 'Un risotto crémeux et parfumé, idéal pour les soirées d\'automne.',
        ingredients: ['riz arborio', 'champignons de Paris', 'parmesan', 'bouillon de légumes', 'beurre', 'oignon', 'vin blanc'],
        notes: '1. Faire suer l\'oignon dans le beurre.\n2. Ajouter le riz et nacrer 2 min.\n3. Déglacer au vin blanc.\n4. Incorporer le bouillon louche par louche.\n5. Ajouter les champignons sautés et le parmesan.',
        categories: ['comfort', 'végétarien'],
        date: new Date('2025-11-12').toISOString(),
      },
      {
        id: 2,
        title: 'Bowl thaï mangue-crevettes',
        emoji: '🥭',
        time: '20 min',
        servings: '2 personnes',
        description: 'Frais, coloré et plein de saveurs, prêt en un clin d\'œil.',
        ingredients: ['crevettes', 'mangue', 'riz jasmin', 'lait de coco', 'citron vert', 'coriandre', 'piment'],
        notes: 'Cuire le riz au lait de coco. Poêler les crevettes avec le piment. Servir avec la mangue fraîche et la coriandre.',
        categories: ['rapide', 'healthy'],
        date: new Date('2025-12-03').toISOString(),
      },
      {
        id: 3,
        title: 'Fondant au chocolat',
        emoji: '🍫',
        time: '25 min',
        servings: '6 personnes',
        description: 'LE classique indémodable avec son cœur coulant irrésistible.',
        ingredients: ['chocolat noir 70%', 'beurre', 'œufs', 'sucre', 'farine', 'vanille'],
        notes: 'Préchauffer à 200°C. Fondre le chocolat avec le beurre. Mélanger œufs + sucre, incorporer le chocolat puis la farine. Cuire 11 min exactement.',
        categories: ['comfort', 'festif', 'dessert'],
        date: new Date('2025-12-20').toISOString(),
      },
    ];

    // ─── STATE ───
    let recipes = JSON.parse(localStorage.getItem('recipes_v2') || 'null') || SAMPLE_RECIPES;
    let editingId = null;
    let activeCategories = [];
    let activeIngredients = [];
    let tempIngredients = [];

    function saveToStorage() {
      localStorage.setItem('recipes_v2', JSON.stringify(recipes));
    }

    // ─── INIT ───
    function init() {
      buildCategoryFilters();
      buildIngredientFilters();
      renderRecipes();
      buildFormCategories();
    }

    // ─── SIDEBAR FILTERS ───
    function buildCategoryFilters() {
      const el = document.getElementById('categoryFilters');
      el.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'tag-filter' + (activeCategories.includes(cat.id) ? ' active' : '');
        btn.textContent = cat.label;
        btn.onclick = () => toggleCategoryFilter(cat.id);
        el.appendChild(btn);
      });
    }

    function buildIngredientFilters() {
      const allIngs = [...new Set(recipes.flatMap(r => r.ingredients))].sort();
      const el = document.getElementById('ingredientFilters');
      el.innerHTML = '';
      allIngs.forEach(ing => {
        const div = document.createElement('div');
        div.className = 'ing-filter-item';
        div.innerHTML = `<input type="checkbox" id="ing-${ing}" ${activeIngredients.includes(ing) ? 'checked' : ''} onchange="toggleIngFilter('${ing}')" /><label for="ing-${ing}">${ing}</label>`;
        el.appendChild(div);
      });
    }

    function toggleCategoryFilter(id) {
      activeCategories = activeCategories.includes(id)
        ? activeCategories.filter(c => c !== id)
        : [...activeCategories, id];
      buildCategoryFilters();
      applyFilters();
    }

    function toggleIngFilter(ing) {
      activeIngredients = activeIngredients.includes(ing)
        ? activeIngredients.filter(i => i !== ing)
        : [...activeIngredients, ing];
      applyFilters();
    }

    function clearAllFilters() {
      activeCategories = [];
      activeIngredients = [];
      document.getElementById('searchInput').value = '';
      buildCategoryFilters();
      buildIngredientFilters();
      applyFilters();
    }

    // ─── FILTER + RENDER ───
    function applyFilters() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const sort = document.getElementById('sortSelect').value;

      let filtered = recipes.filter(r => {
        const matchSearch = !q || r.title.toLowerCase().includes(q) || r.ingredients.some(i => i.toLowerCase().includes(q));
        const matchCats = activeCategories.length === 0 || activeCategories.every(c => r.categories.includes(c));
        const matchIngs = activeIngredients.length === 0 || activeIngredients.every(i => r.ingredients.includes(i));
        return matchSearch && matchCats && matchIngs;
      });

      filtered.sort((a, b) => {
        if (sort === 'newest') return new Date(b.date) - new Date(a.date);
        if (sort === 'oldest') return new Date(a.date) - new Date(b.date);
        if (sort === 'az') return a.title.localeCompare(b.title);
        if (sort === 'za') return b.title.localeCompare(a.title);
      });

      renderRecipes(filtered);
    }

    function renderRecipes(list) {
      const toRender = list !== undefined ? list : recipes;
      document.getElementById('headerCount').textContent = `${recipes.length} recette${recipes.length > 1 ? 's' : ''}`;
      document.getElementById('resultsInfo').textContent = `${toRender.length} résultat${toRender.length > 1 ? 's' : ''}`;
      const grid = document.getElementById('recipesGrid');
      grid.innerHTML = '';

      if (toRender.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="big-emoji">🍳</div><h2>Aucune recette trouvée</h2><p>Essayez d'autres filtres ou ajoutez une nouvelle recette.</p></div>`;
        return;
      }

      toRender.forEach((r, i) => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.style.animationDelay = `${i * 0.06}s`;

        const tagHTML = r.categories.map(c => {
          const cat = CATEGORIES.find(x => x.id === c);
          return `<span class="tag-pill tag-${c}">${cat ? cat.label : c}</span>`;
        }).join('');

        const ingHTML = r.ingredients.slice(0, 5).map(i => `<span class="ing-chip">${i}</span>`).join('') +
          (r.ingredients.length > 5 ? `<span class="ing-chip">+${r.ingredients.length - 5}</span>` : '');

        card.innerHTML = `
          <div class="card-header">
            <div class="card-emoji">${r.emoji || '🍽️'}</div>
            <div class="card-actions">
              <button class="card-action-btn edit" onclick="openEditModal(${r.id}, event)" title="Modifier">✎</button>
              <button class="card-action-btn" onclick="deleteRecipe(${r.id}, event)" title="Supprimer">✕</button>
            </div>
          </div>
          <div class="card-title">${r.title}</div>
          <div class="card-meta">${r.time ? r.time : '—'}${r.servings ? ' · ' + r.servings : ''}</div>
          ${r.description ? `<div class="card-description">${r.description}</div>` : ''}
          <div class="card-tags">${tagHTML}</div>
          <div class="card-ingredients">${ingHTML}</div>
        `;
        card.addEventListener('click', () => openDetail(r.id));
        grid.appendChild(card);
      });
    }

    // ─── DETAIL MODAL ───
    function openDetail(id) {
      const r = recipes.find(x => x.id === id);
      if (!r) return;
      document.getElementById('detailEmoji').textContent = r.emoji || '🍽️';
      document.getElementById('detailTitle').textContent = r.title;
      const meta = [r.time, r.servings].filter(Boolean).join(' · ');
      document.getElementById('detailMeta').textContent = meta;
      document.getElementById('detailIngList').innerHTML = r.ingredients.map(i => `<span class="detail-ing-chip">${i}</span>`).join('');
      document.getElementById('notesLabel').style.display = r.notes ? '' : 'none';
      document.getElementById('detailNotes').textContent = r.notes || '';
      document.getElementById('detailTags').innerHTML = r.categories.map(c => {
        const cat = CATEGORIES.find(x => x.id === c);
        return `<span class="tag-pill tag-${c}">${cat ? cat.label : c}</span>`;
      }).join('');
      document.getElementById('detailModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleDetailClick(e) {
      if (e.target === document.getElementById('detailModal')) closeDetailModal();
    }

    // ─── ADD/EDIT MODAL ───
    function buildFormCategories() {
      const el = document.getElementById('categoriesGrid');
      el.innerHTML = CATEGORIES.map(c => `
        <label class="cat-checkbox">
          <input type="checkbox" value="${c.id}" />
          <span>${c.label}</span>
        </label>
      `).join('');
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').innerHTML = 'Nouvelle <em>recette</em>';
      document.getElementById('modalSubtitle').textContent = 'Immortalise tes créations culinaires';
      document.getElementById('submitBtn').textContent = 'Enregistrer';
      resetForm();
      document.getElementById('addModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function openEditModal(id, e) {
      e.stopPropagation();
      editingId = id;
      const r = recipes.find(x => x.id === id);
      if (!r) return;
      document.getElementById('modalTitle').innerHTML = 'Modifier <em>la recette</em>';
      document.getElementById('modalSubtitle').textContent = r.title;
      document.getElementById('submitBtn').textContent = 'Mettre à jour';
      document.getElementById('fTitle').value = r.title;
      document.getElementById('fEmoji').value = r.emoji || '';
      document.getElementById('fTime').value = r.time || '';
      document.getElementById('fServings').value = r.servings || '';
      document.getElementById('fDesc').value = r.description || '';
      document.getElementById('fNotes').value = r.notes || '';
      tempIngredients = [...r.ingredients];
      renderTempIngredients();
      // set categories
      document.querySelectorAll('#categoriesGrid input[type="checkbox"]').forEach(cb => {
        cb.checked = r.categories.includes(cb.value);
      });
      document.getElementById('addModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleModalClick(e) {
      if (e.target === document.getElementById('addModal')) closeAddModal();
    }

    function resetForm() {
      ['fTitle','fEmoji','fTime','fServings','fDesc','fNotes','fIngInput'].forEach(id => {
        document.getElementById(id).value = '';
      });
      tempIngredients = [];
      document.getElementById('fIngList').innerHTML = '';
      document.querySelectorAll('#categoriesGrid input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    // ─── INGREDIENTS IN FORM ───
    function handleIngKey(e) {
      if (e.key === 'Enter') { e.preventDefault(); addIngredient(); }
    }

    function addIngredient() {
      const val = document.getElementById('fIngInput').value.trim();
      if (!val || tempIngredients.includes(val)) return;
      tempIngredients.push(val);
      document.getElementById('fIngInput').value = '';
      renderTempIngredients();
    }

    function removeIngredient(ing) {
      tempIngredients = tempIngredients.filter(i => i !== ing);
      renderTempIngredients();
    }

    function renderTempIngredients() {
      document.getElementById('fIngList').innerHTML = tempIngredients.map(i =>
        `<span class="ing-added-chip">${i}<button onclick="removeIngredient('${i}')">✕</button></span>`
      ).join('');
    }

    // ─── SAVE / DELETE ───
    function saveRecipe() {
      const title = document.getElementById('fTitle').value.trim();
      if (!title) { document.getElementById('fTitle').focus(); return; }
      const categories = [...document.querySelectorAll('#categoriesGrid input:checked')].map(cb => cb.value);

      if (editingId !== null) {
        const idx = recipes.findIndex(x => x.id === editingId);
        recipes[idx] = {
          ...recipes[idx],
          title,
          emoji: document.getElementById('fEmoji').value.trim() || '🍽️',
          time: document.getElementById('fTime').value.trim(),
          servings: document.getElementById('fServings').value.trim(),
          description: document.getElementById('fDesc').value.trim(),
          ingredients: tempIngredients,
          notes: document.getElementById('fNotes').value.trim(),
          categories,
        };
      } else {
        recipes.unshift({
          id: Date.now(),
          title,
          emoji: document.getElementById('fEmoji').value.trim() || '🍽️',
          time: document.getElementById('fTime').value.trim(),
          servings: document.getElementById('fServings').value.trim(),
          description: document.getElementById('fDesc').value.trim(),
          ingredients: tempIngredients,
          notes: document.getElementById('fNotes').value.trim(),
          categories,
          date: new Date().toISOString(),
        });
      }

      saveToStorage();
      closeAddModal();
      buildIngredientFilters();
      applyFilters();
    }

    function deleteRecipe(id, e) {
      e.stopPropagation();
      if (!confirm('Supprimer cette recette ?')) return;
      recipes = recipes.filter(r => r.id !== id);
      saveToStorage();
      buildIngredientFilters();
      applyFilters();
    }

    // ─── KEYBOARD SHORTCUTS ───
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeAddModal();
        closeDetailModal();
      }
    });

    init();
  </script>
</body>
</html>
